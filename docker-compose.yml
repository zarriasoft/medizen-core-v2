services:
  db:
    image: postgres:15-alpine
    container_name: medizen_db
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medizen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medizen_password}
      POSTGRES_DB: ${POSTGRES_DB:-medizen_core}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medizen_user} -d ${POSTGRES_DB:-medizen_core}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  backend:
    build:
      context: ./backend
    container_name: medizen_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://medizen_user:medizen_password@db:5432/medizen_core}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-key-change-me}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: medizen_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: always

  patient-frontend:
    build:
      context: ./patient-frontend
    container_name: medizen_patient_frontend
    ports:
      - "5174:5174"
    volumes:
      - ./patient-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: always

volumes:
  postgres_data:
